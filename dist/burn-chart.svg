<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="bg-panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="100%" stop-color="#111111" />
    </linearGradient>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff4444" />
      <stop offset="50%" stop-color="#ff4444" />
      <stop offset="51%" stop-color="#00C851" />
      <stop offset="100%" stop-color="#00C851" />
    </linearGradient>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Panel Background -->
  <rect width="800" height="300" rx="12" fill="url(#bg-panel)" />
  <rect width="800" height="300" rx="12" fill="none" stroke="#333333" stroke-width="2" />

  <!-- Title & Axis -->
  <text x="30" y="40" font-family="'Helvetica Neue', Helvetica, sans-serif" font-weight="bold" font-size="16" fill="#888888">API USAGE (LAST 7 DAYS)</text>
  <text x="30" y="70" font-family="'Helvetica Neue', Helvetica, sans-serif" font-weight="bold" font-size="32" fill="#ffffff">$77.40 <tspan font-size="20" fill="#888888" font-weight="normal">-></tspan> <tspan fill="#00C851">$1.12</tspan></text>
  
  <!-- Y Axis Labels -->
  <text x="30" y="110" font-family="monospace" font-size="12" fill="#555555">$80 -</text>
  <text x="30" y="150" font-family="monospace" font-size="12" fill="#555555">$60 -</text>
  <text x="30" y="190" font-family="monospace" font-size="12" fill="#555555">$40 -</text>
  <text x="30" y="230" font-family="monospace" font-size="12" fill="#555555">$20 -</text>
  <text x="30" y="270" font-family="monospace" font-size="12" fill="#555555">$0  -</text>

  <!-- Chart Grid -->
  <path d="M 70 106 L 760 106 M 70 146 L 760 146 M 70 186 L 760 186 M 70 226 L 760 226 M 70 266 L 760 266" stroke="#222222" stroke-width="1" stroke-dasharray="4 4" />

  <!-- Data Line -->
  <!-- Starts high ($77 = Y:112), drops sharply in the middle ($1 = Y:264) -->
  <path d="M 70 115 L 170 130 L 270 112 L 370 118 L 470 264 L 570 264 L 670 264 L 760 264" fill="none" stroke="url(#line-grad)" stroke-width="4" filter="url(#neon-glow)" />

  <!-- Data Points -->
  <circle cx="70" cy="115" r="4" fill="#ff4444" />
  <circle cx="170" cy="130" r="4" fill="#ff4444" />
  <circle cx="270" cy="112" r="4" fill="#ff4444" />
  <circle cx="370" cy="118" r="4" fill="#ff4444" />
  
  <circle cx="470" cy="264" r="4" fill="#00C851" />
  <circle cx="570" cy="264" r="4" fill="#00C851" />
  <circle cx="670" cy="264" r="4" fill="#00C851" />
  <circle cx="760" cy="264" r="4" fill="#00C851" />

  <!-- Annotation -->
  <rect x="360" y="70" width="120" height="24" rx="4" fill="#333333" />
  <text x="420" y="86" font-family="'Helvetica Neue', Helvetica, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="bold">FINOPS ENABLED</text>
  <line x1="420" y1="94" x2="420" y2="264" stroke="#555555" stroke-width="1" stroke-dasharray="2 2" />

  <!-- X Axis Labels -->
  <text x="60" y="285" font-family="monospace" font-size="10" fill="#555555">MON</text>
  <text x="160" y="285" font-family="monospace" font-size="10" fill="#555555">TUE</text>
  <text x="260" y="285" font-family="monospace" font-size="10" fill="#555555">WED</text>
  <text x="360" y="285" font-family="monospace" font-size="10" fill="#ffffff" font-weight="bold">THU</text>
  <text x="460" y="285" font-family="monospace" font-size="10" fill="#555555">FRI</text>
  <text x="560" y="285" font-family="monospace" font-size="10" fill="#555555">SAT</text>
  <text x="660" y="285" font-family="monospace" font-size="10" fill="#555555">SUN</text>
</svg>
